name: ParaBank E2E Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: |
          playwright install --with-deps chromium

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.34.1

          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz

          tar -xzf allure-${ALLURE_VERSION}.tgz

          sudo mv allure-${ALLURE_VERSION} /opt/allure

          echo "/opt/allure/bin" >> $GITHUB_PATH

      - name: Execute Tests
        id: tests
        continue-on-error: true
        env:
          HEADLESS: true
          SLOW_MO: 0
        run: |
          mkdir -p allure-results

          behave \
            --no-capture \
            --no-capture-stderr \
            -f allure_behave.formatter:AllureFormatter \
            -o allure-results

      - name: Verify Allure Installation
        if: always()
        run: |
          allure --version

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results \
            --clean \
            -o allure-report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Upload Evidences
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias
          path: evidencias
          if-no-files-found: ignore

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Fail Pipeline if Tests Failed
        if: always()
        run: |
          if [ "${{ steps.tests.outcome }}" != "success" ]; then
            echo "======================================="
            echo "Alguns testes falharam."
            echo "O relatório Allure foi gerado."
            echo "Os artefatos foram publicados."
            echo "======================================="
            exit 1
          fi

  deploy:
    needs: e2e

    if: always()

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4