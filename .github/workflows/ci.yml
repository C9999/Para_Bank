name: CI - ParaBank E2E

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e-tests:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"

    steps:

      #################################################
      # Checkout
      #################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      #################################################
      # Python
      #################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      #################################################
      # Java (necessário para o Allure)
      #################################################

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      #################################################
      # Cache Playwright
      #################################################

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      #################################################
      # Dependências
      #################################################

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      #################################################
      # Navegadores
      #################################################

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps chromium

      #################################################
      # Instalar Allure
      #################################################

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.43.0/allure-2.43.0.tgz
          tar -xzf allure-2.43.0.tgz
          echo "$PWD/allure-2.43.0/bin" >> $GITHUB_PATH

      #################################################
      # Executar testes
      #################################################

      - name: Run E2E Tests
        run: |
          mkdir -p allure-results

          behave \
            -f progress2 \
            -f allure_behave.formatter:AllureFormatter \
            -o allure-results

      #################################################
      # Gerar relatório Allure
      #################################################

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      #################################################
      # Upload dos artefatos
      #################################################

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parabank-artifacts

          retention-days: 15

          path: |
            allure-results
            allure-report
            evidencias

      #################################################
      # GitHub Pages
      #################################################

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-report:

    needs: e2e-tests

    if: always()

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:

      - name: Deploy Allure Report
        id: deployment
        uses: actions/deploy-pages@v4